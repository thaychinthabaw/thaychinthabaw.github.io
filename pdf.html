<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF စာဖတ်ခန်း</title>

  <link rel="stylesheet" href="pdf.css" />
  <link rel="stylesheet" href="darkmode.css" />

  <!-- PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.js"></script>
</head>

<body class="sepia-mode">

  <!-- ================= TOP BAR ================= -->
  <header class="top-controls">

    <a href="index.html" class="back-link">
      <span class="nav-icon">⌂</span>
      <span class="nav-text">ပင်မ</span>
    </a>

    <div class="right-controls">

      <div class="font-controls">
        <button id="font-decrease">−</button>
        <span id="font-size-display">25</span>
        <button id="font-increase">+</button>
      </div>

      <button id="upload-btn" class="setting-btn">📂</button>

      <button id="focus-btn" class="setting-btn">⛶</button>

      <button class="setting-btn" onclick="toggleSetting()">⚙</button>

    </div>
  </header>


  <!-- ================= HIDDEN FILE INPUT ================= -->
  <input
    type="file"
    id="pdf-upload"
    accept="application/pdf"
    hidden
  />


  <!-- ================= CONTAINER ================= -->
  <main class="container">

    <div class="book-header">
      <h1 id="pdf-title">PDF စာအုပ် မရွေးရသေးပါ</h1>
      <h2 id="pdf-meta">PDF ဖိုင်တင်ပြီး ဖတ်နိုင်ပါပြီ</h2>
    </div>

    <article id="reading-content" class="content-area">

      <div id="pdf-loading" class="loading-box">
        <div class="loader"></div>
        <p>PDF ဖိုင် စောင့်နေပါသည်...</p>
      </div>

      <div id="pdf-pages"></div>

    </article>
  </main>


  <!-- ================= FLOATING BUTTONS ================= -->
  <div class="floating-left-group">

    <button class="toc-toggle-btn" onclick="toggleTOC()">
      ☰
    </button>

    <a href="#top" class="top-btn">⬆</a>

  </div>


  <!-- ================= TOC OVERLAY ================= -->
  <div class="toc-overlay" id="toc-overlay">

    <div class="toc-content">

      <h1>မာတိကာ</h1>

      <span class="close-btn" onclick="toggleTOC()">×</span>

      <div class="toc-header">
        <input
          type="text"
          id="toc-search"
          placeholder="ရှာဖွေရန်..."
        />
      </div>

      <ul class="toc-list" id="toc-list">
      </ul>

      <div class="toc-jump-buttons">
        <button id="toc-top-btn">⬆</button>
        <button id="toc-bottom-btn">⬇</button>
      </div>

    </div>

  </div>


  <!-- ================= SETTING OVERLAY ================= -->
  <div class="setting-overlay" id="setting-overlay">

    <div class="setting-content">

      <div class="setting-header">
        <h2 class="setting-title">ချိန်ညှိချက်များ</h2>
        <span class="setting-close-btn" onclick="toggleSetting()">×</span>
      </div>

      <div class="setting-body">

        <button class="setting-menu-refresh" id="reload-pdf">
          <span class="nav-icon">⟳</span>
          <span class="nav-text">PDF ပြန်ဖွင့်ရန်</span>
        </button>

        <button class="setting-item" onclick="window.print()">
          📄 PDF အဖြစ်သိမ်းရန်
        </button>


        <!-- FONT SIZE -->
        <div class="setting-item-group">

          <span class="setting-title2">
            စာလုံးအရွယ်အစား
          </span>

          <div class="font-size-control">
            <button id="size-minus-10">−10</button>
            <button id="size-minus-1">−</button>

            <span id="font-size-display2">25</span>

            <button id="size-plus-1">+</button>
            <button id="size-plus-10">+10</button>
          </div>

        </div>


        <!-- FONT WEIGHT -->
        <div class="setting-item-group">

          <span class="setting-title2">
            စာလုံးအထူ
          </span>

          <div class="preset-group" id="weight-buttons">
            <button class="preset-btn" data-weight="300">အပါး</button>
            <button class="preset-btn" data-weight="500">အလတ်</button>
            <button class="preset-btn" data-weight="700">အထူ</button>
          </div>

        </div>


        <!-- LINE HEIGHT -->
        <div class="setting-item-group">

          <span class="setting-title2">
            စာကြောင်းကြား အကွာအဝေး
          </span>

          <div class="preset-group">
            <button class="preset-btn line-btn" data-value="1.5">ကျဉ်း</button>
            <button class="preset-btn line-btn" data-value="2.0">အလတ်</button>
            <button class="preset-btn line-btn" data-value="2.5">ကျယ်</button>
          </div>

          <div class="adjust-group">
            <button onclick="adjustLineHeight(-0.1)">−</button>
            <span id="lh-display">2.0</span>
            <button onclick="adjustLineHeight(0.1)">+</button>
          </div>

        </div>


        <!-- LETTER SPACING -->
        <div class="setting-item-group">

          <span class="setting-title2">
            စာလုံးကြား အကွာအဝေး
          </span>

          <div class="preset-group">
            <button class="preset-btn letter-btn" data-value="0">ကျဉ်း</button>
            <button class="preset-btn letter-btn" data-value="1">အလတ်</button>
            <button class="preset-btn letter-btn" data-value="2">ကျယ်</button>
          </div>

          <div class="adjust-group">
            <button onclick="adjustLetterSpacing(-0.5)">−</button>
            <span id="ls-display">0</span>
            <button onclick="adjustLetterSpacing(0.5)">+</button>
          </div>

        </div>

      </div>

    </div>

  </div>


  <!-- ================= FULLSCREEN BTN ================= -->
  <button
    class="fullscreen-round-btn"
    id="fs-btn"
    onclick="toggleReadingMode()"
  >
    ⛶
  </button>


  <script src="darkmode.js"></script>
  <script src="pdf.js"></script>

</body>
</html>
