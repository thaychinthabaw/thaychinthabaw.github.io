<!DOCTYPE html>
<html lang="my">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quiz</title>

<link rel="stylesheet" href="darkmode.css">
<link rel="stylesheet" href="quiz.css">

</head>

<body>

<!-- TOP -->

<div id="fixedTitle">
📖 Quiz
</div>

<button id="modeToggle">
🌙
</button>

<!-- MAIN -->

<main>

<!-- LOGO -->

<div class="avatar-container">
<img
src="thaaychinthabawlogo1.webp"
class="avatar"
alt="logo"
>
</div>

<!-- CHAPTER SCREEN -->

<section
id="chapter-screen"
class="paper-card"
>

<h1 class="main-title">
ဗုဒ္ဓဘာသာ Quiz
</h1>

<p class="sub-text">
အခန်းရွေးပြီး စတင်ဖြေဆိုနိုင်ပါသည်
</p>

<div class="chapter-list">

<button
class="chapter-btn"
data-chapter="1"
>
အခန်း (၁)
</button>

<button
class="chapter-btn"
data-chapter="2"
>
အခန်း (၂)
</button>

<button
class="chapter-btn"
data-chapter="3"
>
အခန်း (၃)
</button>

</div>

</section>

<!-- QUIZ SCREEN -->

<section
id="quiz-screen"
class="paper-card hidden"
>

<div id="question-count">
1 / 10
</div>

<h2 id="question-text">
Question
</h2>

<div id="answers-container">
</div>

<div class="quiz-actions">

<button
id="back-btn"
class="action-btn"
>
အပြန်
</button>

<button
id="next-btn"
class="action-btn"
>
နောက်တစ်ခု
</button>

</div>

</section>

<!-- FINISH -->

<section
id="finish-screen"
class="paper-card hidden"
>

<h2 class="finish-title">
ပြီးဆုံးပါပြီ
</h2>

<p class="finish-text">
Quiz ဖြေဆိုမှု ပြီးဆုံးသွားပါပြီ
</p>

<button
id="restart-btn"
class="action-btn"
>
ပြန်စ
</button>

</section>

</main>

<!-- BOTTOM NAV -->

<nav class="bottom-nav">

<a href="index.html">
<span class="icon">🏠</span>
<span>ပင်မ</span>
</a>

<a href="quiz.html" class="active">
<span class="icon">❓</span>
<span>Quiz</span>
</a>

</nav>

<script src="darkmode.js"></script>
<script src="quiz-data.js"></script>
<script src="quiz.js"></script>

</body>
</html>
