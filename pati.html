<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>စာဖတ်ခန်း | သေခြင်းသဘော</title>
    <link rel="stylesheet" href="pati.css">
    <link rel="stylesheet" href="darkmode.css">
    <link rel="icon" type="image/png" href="https://thaychinthabaw.netlify.app/thaychinthabawlogo1.png">
    <script defer src="pati.js"></script>
</head>
<body class="is-paper">
    <div class="container">
        <nav class="top-controls">
            <a href="index.html" class="back-link">
                <span class="nav-icon">⌂</span>
                <span class="nav-text">ပင်မ</span>
            </a>
            <button id="fs-btn" class="fullscreen-round-btn" onclick="toggleReadingMode()">⛶</button>
            <div class="right-controls">
                <button class="setting-btn" onclick="toggleSetting()">⚙</button>
                <button id="modeToggle">☀️</button>    
            </div>
        </nav>
        
        <article class="content-area" id="reading-content">
            <div id="last-read-container"></div>  
        </article>
    </div>

    <div class="floating-left-group">
        <a href="#" class="top-btn" title="အပေါ်ဆုံးသို့">⬆</a>
        <button class="toc-toggle-btn" id="toc-toggle" onclick="toggleTOC()">☰</button>
    </div>

    <div id="setting-overlay" class="setting-overlay" onclick="toggleSetting()">
        <div class="setting-content" onclick="event.stopPropagation()">
            <div class="setting-header">
                <h1 class="setting-title">ချိန်ညှိချက်များ</h1>
                <span class="setting-close-btn" onclick="toggleSetting()">×</span>
            </div>
            <div class="setting-body">
                <button class="setting-menu-refresh" onclick="location.reload()">
                    <span class="nav-icon">⟳</span>
                    <span class="nav-text">အသစ်ဖြစ်အောင်လုပ်ရန်</span>
                </button>
                <button class="setting-item" onclick="downloadPDF()">📄 စာအုပ်အဖြစ်သိမ်းရန်</button>
                
                <div class="setting-item-group">
                    <span class="setting-title2">စာလုံးအရွယ်အစား</span>
                    <div class="font-size-control">
                        <button id="font-decrease">−</button>
                        <span id="font-size-display">25</span>
                        <button id="font-increase">+</button>
                    </div>
                    <div class="spinner-wrapper">
                        <div class="spinner-box">
                            <button id="size-plus-10">▲</button>
                            <span id="size-tens">2</span>
                            <button id="size-minus-10">▼</button>
                        </div>
                        <div class="spinner-box">
                            <button id="size-plus-1">▲</button>
                            <span id="size-ones">5</span>
                            <button id="size-minus-1">▼</button>
                        </div>
                    </div>
                </div>
                
                <div class="setting-item-group">
                    <span class="setting-title2">စာလုံးအထူ</span>
                    <div class="preset-group" id="weight-buttons">
                        <button class="preset-btn" data-weight="300">အပါး</button>
                        <button class="preset-btn active-preset" data-weight="500">အလတ်</button>
                        <button class="preset-btn" data-weight="900">အထူ</button>
                    </div>
                    <div class="spinner-wrapper">
                        <div class="spinner-box">
                            <button id="weight-plus-100">▲</button>
                            <span id="digit-hundreds">5</span>
                            <button id="weight-minus-100">▼</button>
                        </div>
                        <div class="spinner-box">
                            <button id="weight-plus-10">▲</button>
                            <span id="digit-tens">0</span>
                            <button id="weight-minus-10">▼</button>
                        </div>
                        <div class="spinner-box">
                            <button id="weight-plus-1">▲</button>
                            <span id="digit-ones">0</span>
                            <button id="weight-minus-1">▼</button>
                        </div>
                    </div>
                </div>

                <div class="setting-item-group">
                    <span class="setting-title2">စာကြောင်းကြား အကွာအဝေး</span>
                    <div class="preset-group">
                        <button class="preset-btn line-btn" data-value="1.5">ကျဉ်း</button>
                        <button class="preset-btn line-btn" data-value="2.0">အလတ်</button>
                        <button class="preset-btn line-btn" data-value="2.5">ကျယ်</button>
                    </div>
                    <div class="adjust-group">
                        <button onclick="adjustLineHeight(-0.1)">−</button>
                        <span id="lh-display">2.0</span>
                        <button onclick="adjustLineHeight(0.1)">+</button>
                    </div>
                </div>

                <div class="setting-item-group">
                    <span class="setting-title2">စာလုံးကြား အကွာအဝေး</span>
                    <div class="preset-group">
                        <button class="preset-btn letter-btn" data-value="0">ကျဉ်း</button>
                        <button class="preset-btn letter-btn" data-value="1">အလတ်</button>
                        <button class="preset-btn letter-btn" data-value="2">ကျယ်</button>
                    </div>
                    <div class="adjust-group">
                        <button onclick="adjustLetterSpacing(-0.5)">−</button>
                        <span id="ls-display">0</span>
                        <button onclick="adjustLetterSpacing(0.5)">+</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toc-overlay" class="toc-overlay" onclick="toggleTOC()" style="display: none;">
        <div class="toc-content" onclick="event.stopPropagation()">
            <h1 style="color:#443300;">မာတိကာ</h1>
            <input type="text" id="toc-search" placeholder="ခေါင်းစဉ် ရှာရန်...">
            <span class="close-btn" onclick="toggleTOC()">×</span>
            
            <ul class="toc-list" id="toc-list"></ul>

            <div class="toc-jump-buttons">
                <button id="toc-top-btn">⬆</button>
                <button id="toc-bottom-btn">⬇</button>
            </div>
        </div>
    </div>

    <script src="darkmode.js"></script>
</body>
</html>
